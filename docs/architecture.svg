<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" width="100%" height="100%" style="background-color: #F8FAFC; font-family: system-ui, -apple-system, sans-serif;">
  <defs>
    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%" filterUnits="userSpaceOnUse">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" />
      <feOffset dx="0" dy="4" />
      <feComponentTransfer><feFuncA type="linear" slope="0.08" /></feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Arrow Markers -->
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#3B82F6" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#10B981" />
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#8B5CF6" />
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#64748B" />
    </marker>

    <!-- Gradients -->
    <linearGradient id="grad-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EFF6FF" />
      <stop offset="100%" stop-color="#DBEAFE" />
    </linearGradient>
    <linearGradient id="grad-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ECFDF5" />
      <stop offset="100%" stop-color="#D1FAE5" />
    </linearGradient>
    <linearGradient id="grad-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5F3FF" />
      <stop offset="100%" stop-color="#EDE9FE" />
    </linearGradient>
    <linearGradient id="grad-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF7ED" />
      <stop offset="100%" stop-color="#FFEDD5" />
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="50" y="45" font-size="24" font-weight="800" fill="#0F172A">Puls-Events RAG Architecture</text>
  <text x="50" y="70" font-size="14" font-weight="500" fill="#64748B">Modular Data Ingestion Pipeline &amp; Real-time Semantic Inference</text>

  <!-- Section 1: Ingestion & Processing Swimlane -->
  <rect x="30" y="100" width="280" height="490" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow)" />
  <rect x="30" y="100" width="280" height="40" rx="12" fill="#3B82F6" opacity="0.1" />
  <text x="50" y="125" font-size="14" font-weight="700" fill="#1E3A8A">1. INGESTION &amp; PROCESSING</text>

  <!-- OpenAgenda API -->
  <g filter="url(#shadow)">
    <rect x="50" y="160" width="240" height="60" rx="8" fill="url(#grad-blue)" stroke="#3B82F6" stroke-width="1.5" />
    <text x="70" y="185" font-size="13" font-weight="700" fill="#1E3A8A">OpenAgenda API v2</text>
    <text x="70" y="202" font-size="11" fill="#475569">Source Agenda (Paris Events)</text>
  </g>

  <!-- Arrow down to fetch_data.py -->
  <path d="M 170 220 L 170 250" fill="none" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrow-blue)" />

  <!-- fetch_data.py -->
  <g filter="url(#shadow)">
    <rect x="50" y="250" width="240" height="50" rx="8" fill="#FFFFFF" stroke="#64748B" stroke-width="1" />
    <rect x="55" y="255" width="4" height="40" rx="2" fill="#3B82F6" />
    <text x="70" y="275" font-size="12" font-weight="700" fill="#0F172A">fetch_data.py</text>
    <text x="70" y="290" font-size="10" font-weight="500" fill="#64748B">Fetch Raw Event JSON</text>
  </g>

  <!-- Arrow down to events.json -->
  <path d="M 170 300 L 170 330" fill="none" stroke="#64748B" stroke-width="2" marker-end="url(#arrow-gray)" />

  <!-- Raw JSON File -->
  <g filter="url(#shadow)">
    <rect x="50" y="330" width="240" height="50" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" />
    <text x="70" y="353" font-size="12" font-weight="700" fill="#475569">events.json (Raw)</text>
    <text x="70" y="368" font-size="10" fill="#94A3B8">data/raw/</text>
  </g>

  <!-- Arrow down to process_data.py -->
  <path d="M 170 380 L 170 410" fill="none" stroke="#64748B" stroke-width="2" marker-end="url(#arrow-gray)" />

  <!-- process_data.py -->
  <g filter="url(#shadow)">
    <rect x="50" y="410" width="240" height="50" rx="8" fill="#FFFFFF" stroke="#64748B" stroke-width="1" />
    <rect x="55" y="415" width="4" height="40" rx="2" fill="#3B82F6" />
    <text x="70" y="435" font-size="12" font-weight="700" fill="#0F172A">process_data.py</text>
    <text x="70" y="450" font-size="10" font-weight="500" fill="#64748B">Temporal Filtering &amp; Formatting</text>
  </g>

  <!-- Arrow down to events_structured.csv -->
  <path d="M 170 460 L 170 490" fill="none" stroke="#64748B" stroke-width="2" marker-end="url(#arrow-gray)" />

  <!-- Cleaned CSV Data -->
  <g filter="url(#shadow)">
    <rect x="50" y="490" width="240" height="60" rx="8" fill="url(#grad-blue)" stroke="#3B82F6" stroke-width="1.5" />
    <text x="70" y="515" font-size="12" font-weight="700" fill="#1E3A8A">events_structured.csv</text>
    <text x="70" y="532" font-size="10" fill="#475569">data/processed/ (Cleaned event cards)</text>
  </g>


  <!-- Section 2: Vector Indexing Swimlane -->
  <rect x="350" y="100" width="280" height="490" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow)" />
  <rect x="350" y="100" width="280" height="40" rx="12" fill="#10B981" opacity="0.1" />
  <text x="370" y="125" font-size="14" font-weight="700" fill="#065F46">2. VECTOR INDEXING</text>

  <!-- Arrow from events_structured.csv to rebuild_index.py -->
  <path d="M 290 520 Q 330 520 330 460 T 370 460" fill="none" stroke="#3B82F6" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrow-blue)" />

  <!-- rebuild_index.py -->
  <g filter="url(#shadow)">
    <rect x="370" y="435" width="240" height="65" rx="8" fill="#FFFFFF" stroke="#64748B" stroke-width="1" />
    <rect x="375" y="440" width="4" height="55" rx="2" fill="#10B981" />
    <text x="390" y="458" font-size="12" font-weight="700" fill="#0F172A">rebuild_index.py</text>
    <text x="390" y="473" font-size="10" fill="#64748B">Recursive Character Splitter</text>
    <text x="390" y="486" font-size="10" fill="#94A3B8">Chunk size: 500 | Overlap: 50</text>
  </g>

  <!-- Bidirectional Arrow between rebuild_index.py and Mistral Embedding -->
  <path d="M 440 435 L 440 330" fill="none" stroke="#10B981" stroke-width="2" marker-end="url(#arrow-green)" />
  <path d="M 460 330 L 460 435" fill="none" stroke="#10B981" stroke-width="2" stroke-dasharray="3,3" marker-end="url(#arrow-green)" orient="auto-start-reverse" />

  <!-- Mistral Embedding API -->
  <g filter="url(#shadow)">
    <rect x="370" y="260" width="240" height="70" rx="8" fill="url(#grad-green)" stroke="#10B981" stroke-width="1.5" />
    <text x="390" y="285" font-size="13" font-weight="700" fill="#065F46">Mistral AI Embeddings</text>
    <text x="390" y="302" font-size="11" font-weight="600" fill="#047857">mistral-embed</text>
    <text x="390" y="316" font-size="10" fill="#065F46">1024-dimensional semantic vectors</text>
  </g>

  <!-- Arrow up from rebuild_index.py to FAISS Index -->
  <path d="M 540 435 Q 570 435 570 300 T 540 230" fill="none" stroke="#10B981" stroke-width="2" marker-end="url(#arrow-green)" />

  <!-- FAISS Index -->
  <g filter="url(#shadow)">
    <rect x="370" y="160" width="240" height="70" rx="8" fill="url(#grad-green)" stroke="#10B981" stroke-width="2" />
    <text x="390" y="185" font-size="13" font-weight="700" fill="#065F46">FAISS Vector Index</text>
    <text x="390" y="202" font-size="11" fill="#34D399" font-weight="bold">data/faiss_index/</text>
    <text x="390" y="216" font-size="10" fill="#047857">Lightweight local storage (Binary)</text>
  </g>


  <!-- Section 3: RAG Inference (Real-time Assistant) Swimlane -->
  <rect x="670" y="100" width="300" height="490" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow)" />
  <rect x="670" y="100" width="300" height="40" rx="12" fill="#8B5CF6" opacity="0.1" />
  <text x="690" y="125" font-size="14" font-weight="700" fill="#5B21B6">3. RAG INFERENCE (REAL-TIME)</text>

  <!-- User Question Card -->
  <g filter="url(#shadow)">
    <rect x="700" y="160" width="240" height="55" rx="8" fill="url(#grad-orange)" stroke="#F97316" stroke-width="1.5" />
    <text x="720" y="182" font-size="12" font-weight="700" fill="#C2410C">User Query</text>
    <text x="720" y="198" font-size="11" font-style="italic" fill="#7C2D12">"Jazz concerts in Paris?"</text>
  </g>

  <!-- Arrow down from User Question to rag_system.py -->
  <path d="M 820 215 L 820 250" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrow-gray)" />

  <!-- rag_system.py (LangChain Orchestrator) -->
  <g filter="url(#shadow)">
    <rect x="700" y="250" width="240" height="185" rx="8" fill="url(#grad-purple)" stroke="#8B5CF6" stroke-width="2" />
    <text x="720" y="275" font-size="13" font-weight="800" fill="#5B21B6">rag_system.py</text>
    <text x="720" y="292" font-size="11" font-weight="600" fill="#6D28D9">LangChain RAG Chain</text>

    <!-- Sub-steps inside rag_system.py -->
    <rect x="715" y="305" width="210" height="32" rx="4" fill="#FFFFFF" stroke="#D8B4FE" stroke-width="1" />
    <text x="725" y="325" font-size="10" font-weight="700" fill="#6D28D9">1. Retrieval: FAISS similarity search (k=5)</text>

    <rect x="715" y="345" width="210" height="32" rx="4" fill="#FFFFFF" stroke="#D8B4FE" stroke-width="1" />
    <text x="725" y="365" font-size="10" font-weight="700" fill="#6D28D9">2. Context Formulation (Strict Prompt)</text>

    <rect x="715" y="385" width="210" height="32" rx="4" fill="#FFFFFF" stroke="#D8B4FE" stroke-width="1" />
    <text x="725" y="405" font-size="10" font-weight="700" fill="#6D28D9">3. Generation: LLM Prompt Synthesis</text>
  </g>

  <!-- Arrow from FAISS Index to rag_system.py Retrieval step -->
  <path d="M 610 195 Q 655 195 655 320 L 715 320" fill="none" stroke="#10B981" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrow-green)" />

  <!-- Arrow from rag_system.py Generation step (left) to Mistral Chat LLM -->
  <path d="M 700 370 L 610 370" fill="none" stroke="#8B5CF6" stroke-width="2" marker-end="url(#arrow-purple)" />
  <path d="M 610 390 L 700 390" fill="none" stroke="#8B5CF6" stroke-width="2" stroke-dasharray="3,3" marker-end="url(#arrow-purple)" />

  <!-- Mistral Chat LLM -->
  <g filter="url(#shadow)">
    <rect x="370" y="350" width="240" height="60" rx="8" fill="url(#grad-purple)" stroke="#8B5CF6" stroke-width="1.5" />
    <text x="390" y="375" font-size="13" font-weight="700" fill="#5B21B6">Mistral Chat LLM</text>
    <text x="390" y="392" font-size="11" font-weight="600" fill="#6D28D9">open-mistral-nemo (12B)</text>
  </g>

  <!-- Arrow down from rag_system.py to Generated Answer -->
  <path d="M 820 435 L 820 480" fill="none" stroke="#8B5CF6" stroke-width="2" marker-end="url(#arrow-purple)" />

  <!-- Generated Answer -->
  <g filter="url(#shadow)">
    <rect x="700" y="480" width="240" height="60" rx="8" fill="url(#grad-orange)" stroke="#F97316" stroke-width="2" />
    <text x="720" y="505" font-size="12" font-weight="700" fill="#C2410C">Generated Answer</text>
    <text x="720" y="522" font-size="10" font-weight="500" fill="#7C2D12">Natural language, 100% sourced answer</text>
  </g>

</svg>
